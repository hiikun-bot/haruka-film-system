<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARUKA FILM — チーム参加登録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--white:#ffffff;--surface:#f9f8f5;
  --border:#e0ddd6;--border-light:#ece9e2;
  --text:#1a1a1a;--text-muted:#888;
  --em:#5fa89a;--em-dark:#3d7a6e;--em-pale:#e8f4f1;
  --danger:#E24B4A;--success:#3d7a6e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:url('HARUKAFILM背景.png') center/cover no-repeat;
  opacity:0.06;pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;width:100%;max-width:460px;padding:24px 20px}

.logo-area{text-align:center;margin-bottom:28px}
.logo-title{font-size:13px;font-weight:700;letter-spacing:.25em;color:var(--em-dark);text-transform:uppercase}
.logo-sub{font-size:11px;color:var(--text-muted);letter-spacing:.15em;margin-top:4px}

.card{
  background:var(--white);border-radius:16px;padding:36px 32px;
  border:0.5px solid var(--border);
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}

.invite-header{margin-bottom:24px;padding-bottom:20px;border-bottom:0.5px solid var(--border-light)}
.invite-label{font-size:11px;letter-spacing:.1em;color:var(--em);font-weight:600;margin-bottom:10px}
.invite-email{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.invite-role{
  display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;
  background:var(--em-pale);color:var(--em-dark);
}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500;letter-spacing:.03em}
.form-control{
  width:100%;background:var(--surface);border:0.5px solid var(--border);
  border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;
  font-family:'Noto Sans JP',sans-serif;transition:border-color .15s;outline:none;
}
.form-control:focus{border-color:var(--em)}
.form-control::placeholder{color:#bbb}
.form-control:disabled{opacity:.5;cursor:not-allowed}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:4px}

.btn-primary{
  width:100%;padding:13px;
  background:var(--em-dark);color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;font-family:'Noto Sans JP',sans-serif;
  letter-spacing:.05em;
}
.btn-primary:hover{background:#2e6059;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-msg{
  background:rgba(226,75,74,.07);border:0.5px solid rgba(226,75,74,.3);
  border-radius:8px;padding:10px 13px;font-size:13px;color:var(--danger);
  margin-bottom:14px;display:none;
}
.error-msg.show{display:block}
.success-msg{
  background:var(--em-pale);border:0.5px solid var(--em);
  border-radius:8px;padding:10px 13px;font-size:13px;color:var(--em-dark);
  margin-bottom:14px;display:none;
}
.success-msg.show{display:block}

.invalid-wrap{text-align:center;padding:24px}
.invalid-icon{font-size:36px;margin-bottom:12px}
.invalid-text{font-size:14px;color:var(--text-muted);line-height:1.8}

.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-area">
    <div class="logo-title">HARUKA FILM</div>
    <div class="logo-sub">TEAM INVITATION</div>
  </div>

  <div class="card" id="main-card">
    <div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">招待リンクを確認中...</div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');

const roleLabels = {
  admin:'管理者', secretary:'秘書', producer:'プロデューサー',
  director:'ディレクター', editor:'編集者', designer:'デザイナー', client:'クライアント'
};

async function init() {
  if (!token) { showInvalid('招待トークンがありません'); return; }
  try {
    const res  = await fetch(`/api/invitations/verify/${token}`);
    const data = await res.json();
    if (!res.ok) { showInvalid(data.error); return; }
    showRegisterForm(data);
  } catch(e) {
    showInvalid('ネットワークエラーが発生しました');
  }
}

function showInvalid(msg) {
  document.getElementById('main-card').innerHTML = `
    <div class="invalid-wrap">
      <div class="invalid-icon">🔗</div>
      <div class="invalid-text">${msg}<br><br>
        <a href="/haruka.html" style="color:var(--em-dark);font-weight:600">ログインページへ</a>
      </div>
    </div>`;
}

function showRegisterForm(data) {
  document.getElementById('main-card').innerHTML = `
    <div class="invite-header">
      <div class="invite-label">📩 招待が届いています</div>
      <div class="invite-email">${data.email}</div>
      <span class="invite-role">${roleLabels[data.role] || data.role}</span>
      <span style="font-size:13px;color:var(--text-muted);margin-left:6px">としてチームに参加します</span>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
      <label>表示名 <span style="color:var(--danger)">*</span></label>
      <input type="text" class="form-control" id="reg-name" placeholder="例：田中 太郎">
    </div>
    <div class="form-group">
      <label>パスワード <span style="color:var(--danger)">*</span></label>
      <input type="password" class="form-control" id="reg-pass" placeholder="8文字以上">
      <div class="form-hint">8文字以上で設定してください</div>
    </div>
    <div class="form-group" style="margin-bottom:24px">
      <label>パスワード（確認）</label>
      <input type="password" class="form-control" id="reg-pass2" placeholder="••••••••" onkeydown="if(event.key==='Enter')register()">
    </div>

    <button class="btn-primary" onclick="register()" id="reg-btn">アカウントを作成してログイン</button>
  `;
}

async function register() {
  const name  = document.getElementById('reg-name').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const btn   = document.getElementById('reg-btn');

  if (!name)           { showErr('表示名を入力してください'); return; }
  if (pass.length < 8) { showErr('パスワードは8文字以上必要です'); return; }
  if (pass !== pass2)  { showErr('パスワードが一致しません'); return; }

  btn.innerHTML = '<span class="spinner"></span>登録中...';
  btn.disabled = true;

  try {
    const res  = await fetch('/api/invitations/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, name, password: pass }),
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error); return; }

    document.getElementById('success-msg').textContent = `✅ ようこそ、${name}さん！チームへの参加が完了しました。`;
    document.getElementById('success-msg').classList.add('show');
    setTimeout(() => window.location.href = '/haruka.html', 1500);
  } catch(e) {
    showErr('ネットワークエラーが発生しました');
  } finally {
    btn.innerHTML = 'アカウントを作成してログイン';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}

init();
</script>
</body>
</html>
