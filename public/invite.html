<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARUKA FILM — チーム参加登録</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png?v=2">
<link rel="shortcut icon" href="/icon-192.png?v=2">
<link rel="apple-touch-icon" href="/icon-180.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:#0a2e2d;
}

.bg{
  position:fixed;inset:0;
  background:url('HARUKAFILM背景.png') center/cover no-repeat;
  z-index:0;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(5,30,28,0.72) 0%,rgba(8,40,38,0.60) 100%);
}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:28px;
}

.logo-area{text-align:center}
.logo-title{
  font-family:'Montserrat',sans-serif;
  font-size:32px;font-weight:800;
  letter-spacing:0.18em;
  color:#fff;
  text-shadow:0 2px 20px rgba(62,207,202,0.5);
  line-height:1.1;
}
.logo-accent{color:#3ECFCA}
.logo-sub{
  font-family:'Montserrat',sans-serif;
  font-size:10px;font-weight:400;
  letter-spacing:0.35em;
  color:rgba(255,255,255,0.55);
  margin-top:8px;
  text-transform:uppercase;
}
.logo-bar{
  width:40px;height:2px;
  background:linear-gradient(90deg,#3ECFCA,rgba(62,207,202,0));
  margin:12px auto 0;border-radius:2px;
}

.card{
  width:100%;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;padding:36px 32px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.15);
}

.invite-header{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.12)}
.invite-label{font-size:11px;letter-spacing:.12em;color:#3ECFCA;font-weight:600;margin-bottom:10px}
.invite-email{font-size:17px;font-weight:700;color:#fff;margin-bottom:8px}
.invite-role{
  display:inline-block;padding:3px 12px;border-radius:4px;
  font-size:11px;font-weight:600;
  background:rgba(62,207,202,0.2);color:#3ECFCA;
  border:1px solid rgba(62,207,202,0.3);
}
.invite-role-text{font-size:13px;color:rgba(255,255,255,0.6);margin-left:8px}

.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:11px;
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.6);
  margin-bottom:6px;font-weight:500;
}
.form-control{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:8px;padding:11px 14px;
  color:#fff;font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
  transition:border-color .15s,background .15s;
  outline:none;
}
.form-control:focus{
  border-color:rgba(62,207,202,0.7);
  background:rgba(255,255,255,0.12);
}
.form-control::placeholder{color:rgba(255,255,255,0.3)}
.form-hint{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px}

.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#3ECFCA,#2BB8B4);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  letter-spacing:0.08em;
  box-shadow:0 4px 16px rgba(62,207,202,0.35);
  margin-top:8px;
}
.btn-primary:hover{
  background:linear-gradient(135deg,#4ADBD6,#35C8C4);
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(62,207,202,0.5);
}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-msg{
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.35);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#ff9090;
  margin-bottom:14px;display:none;
}
.error-msg.show{display:block}
.success-msg{
  background:rgba(62,207,202,0.15);
  border:1px solid rgba(62,207,202,0.35);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#3ECFCA;
  margin-bottom:14px;display:none;
}
.success-msg.show{display:block}

.invalid-wrap{text-align:center;padding:24px}
.invalid-icon{font-size:36px;margin-bottom:12px}
.invalid-text{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.8}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* モバイル (max-width:480px) */
@media(max-width:480px){
  .wrap{padding:14px;gap:20px}
  .logo-title{font-size:24px;letter-spacing:0.14em}
  .logo-sub{font-size:9px;letter-spacing:0.3em}
  .card{padding:22px 18px;border-radius:14px}
  .form-control{font-size:16px;padding:12px 14px}
  .btn-primary{padding:14px;font-size:14px}
  .invite-email{font-size:15px;word-break:break-all}
  .invite-header{margin-bottom:18px;padding-bottom:16px}
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="wrap">
  <div class="logo-area">
    <div class="logo-title">HARUKA <span class="logo-accent">FILM</span></div>
    <div class="logo-sub">Team Invitation</div>
    <div class="logo-bar"></div>
  </div>

  <div class="card" id="main-card">
    <div style="text-align:center;padding:30px;color:rgba(255,255,255,0.5);font-size:13px">招待リンクを確認中...</div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');

const roleLabels = {
  admin:'管理者', secretary:'秘書', producer:'プロデューサー',
  director:'ディレクター', editor:'編集者', designer:'デザイナー', client:'クライアント'
};

async function init() {
  if (!token) { showInvalid('招待トークンがありません'); return; }
  try {
    const res  = await fetch(`/api/invitations/verify/${token}`);
    const data = await res.json();
    if (!res.ok) { showInvalid(data.error); return; }
    showRegisterForm(data);
  } catch(e) {
    showInvalid('ネットワークエラーが発生しました');
  }
}

function showInvalid(msg) {
  document.getElementById('main-card').innerHTML = `
    <div class="invalid-wrap">
      <div class="invalid-icon">🔗</div>
      <div class="invalid-text">${msg}<br><br>
        <a href="/haruka.html" style="color:#3ECFCA;font-weight:600">ログインページへ</a>
      </div>
    </div>`;
}

function showRegisterForm(data) {
  document.getElementById('main-card').innerHTML = `
    <div class="invite-header">
      <div class="invite-label">📩 招待が届いています</div>
      <div class="invite-email">${data.email}</div>
      <span class="invite-role">${roleLabels[data.role] || data.role}</span>
      <span class="invite-role-text">としてチームに参加します</span>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
      <label>表示名 *</label>
      <input type="text" class="form-control" id="reg-name" placeholder="例：田中 太郎">
    </div>
    <div class="form-group">
      <label>パスワード *</label>
      <input type="password" class="form-control" id="reg-pass" placeholder="8文字以上">
      <div class="form-hint">8文字以上で設定してください</div>
    </div>
    <div class="form-group">
      <label>パスワード（確認）</label>
      <input type="password" class="form-control" id="reg-pass2" placeholder="••••••••" onkeydown="if(event.key==='Enter')register()">
    </div>

    <button class="btn-primary" onclick="register()" id="reg-btn">アカウントを作成してログイン</button>
  `;
}

async function register() {
  const name  = document.getElementById('reg-name').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const btn   = document.getElementById('reg-btn');

  if (!name)           { showErr('表示名を入力してください'); return; }
  if (pass.length < 8) { showErr('パスワードは8文字以上必要です'); return; }
  if (pass !== pass2)  { showErr('パスワードが一致しません'); return; }

  btn.innerHTML = '<span class="spinner"></span>登録中...';
  btn.disabled = true;

  try {
    const res  = await fetch('/api/invitations/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, name, password: pass }),
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error); return; }

    document.getElementById('success-msg').textContent = `✅ ようこそ、${name}さん！チームへの参加が完了しました。`;
    document.getElementById('success-msg').classList.add('show');
    setTimeout(() => window.location.href = '/haruka.html', 1500);
  } catch(e) {
    showErr('ネットワークエラーが発生しました');
  } finally {
    btn.innerHTML = 'アカウントを作成してログイン';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}

init();
</script>
</body>
</html>
