<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>リソースカレンダー（ADR 017 Phase 1.x）</title>
<style>
  :root {
    --border: #d8dde3;
    --border-soft: #ecf0f4;
    --bg-holiday: #fdf3f3;
    --bg-totalrow: #f3f6fa;
    --bg-diverge: #fff3cd;     /* 手動値が GCal 計算と異なる場合の警告色 */
    --text-muted: #6b7280;
    --accent: #1a73e8;
    --gcal: #2e7d32;
    --manual: #0d6efd;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif; margin: 1.2em; color: #222; }
  h1 { font-size: 1.3em; margin: 0 0 0.5em; }
  .toolbar { display: flex; align-items: center; gap: 1em; flex-wrap: wrap; margin: 0.5em 0 1em; }
  .tabs { display: flex; gap: 0.3em; flex-wrap: wrap; }
  .tab { padding: 0.35em 0.9em; border: 1px solid var(--border); border-radius: 999px; background: #fff; cursor: pointer; font-size: 0.9em; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-range { display: flex; align-items: center; gap: 0.4em; font-size: 0.9em; }
  .nav-range button { padding: 0.25em 0.6em; border: 1px solid var(--border); background: #fff; border-radius: 6px; cursor: pointer; }
  .right-buttons { margin-left: auto; display: flex; gap: 0.5em; }
  button.primary { background: var(--accent); color: #fff; border: 1px solid var(--accent); padding: 0.45em 1em; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  button.outline { background: #fff; color: #333; border: 1px solid var(--border); padding: 0.45em 1em; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
  .privacy-note { background: #f1f8e9; border: 1px solid #c5e1a5; color: #33691e; padding: 0.5em 0.8em; border-radius: 6px; font-size: 0.82em; margin: 0.5em 0 1em; display: inline-block; }
  .legend { font-size: 0.78em; color: var(--text-muted); margin: 0 0 0.7em; }
  .legend span { display: inline-block; margin-right: 0.8em; }
  .legend .lg-manual { color: var(--manual); font-weight: 700; }
  .grid-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 8px; max-height: calc(100vh - 220px); }
  table.grid { border-collapse: collapse; font-size: 0.82em; min-width: 800px; }
  table.grid th, table.grid td { border: 1px solid var(--border-soft); padding: 0.25em 0.4em; text-align: center; white-space: nowrap; }
  table.grid thead th { background: #fff; z-index: 2; font-weight: 600; }
  /* 2段のヘッダーがそれぞれ別の top にスタックするよう調整 */
  table.grid thead tr:first-child th { position: sticky; top: 0; z-index: 3; }
  table.grid thead tr:nth-child(2) th { position: sticky; top: 28px; z-index: 2; }
  table.grid thead th.month-head { background: #f6f8fa; font-size: 0.88em; padding: 0.4em 0.5em; }
  table.grid td.name-col, table.grid th.name-col { position: sticky; left: 0; background: #fff; text-align: left; min-width: 9em; max-width: 14em; overflow: hidden; text-overflow: ellipsis; z-index: 1; }
  table.grid td.default-col, table.grid th.default-col { position: sticky; background: #fff; color: var(--text-muted); font-size: 0.78em; z-index: 1; }
  table.grid th.default-weekday, table.grid td.default-weekday { left: 9em; }
  table.grid th.default-holiday, table.grid td.default-holiday { left: 12em; }
  table.grid th.total-col, table.grid td.total-col { background: #fafafa; font-weight: 600; min-width: 3em; }
  table.grid td.is-holiday, table.grid th.is-holiday { background: var(--bg-holiday); }
  table.grid tr.team-header td { background: #eef3fa; font-weight: 700; text-align: left; padding: 0.4em 0.6em; }
  table.grid tr.team-total td, table.grid tr.org-total td { background: var(--bg-totalrow); font-weight: 700; }
  table.grid tr.org-total td { background: #fff3cd; }
  td.day-cell { min-width: 3em; cursor: default; position: relative; }
  td.day-cell.editable { cursor: pointer; }
  td.day-cell.editable:hover { background: #eef5ff; }
  td.day-cell.zero { color: #c62828; }
  td.day-cell.diverge { background: var(--bg-diverge); }
  td.day-cell.diverge.is-holiday { background: linear-gradient(135deg, var(--bg-diverge) 60%, var(--bg-holiday)); }
  td.day-cell .manual-mark { color: var(--manual); font-weight: 700; margin-left: 0.15em; font-size: 0.85em; vertical-align: 1px; }
  .gcal-mark { color: var(--gcal); margin-right: 0.2em; }
  .leader-mark { color: #ef6c00; margin-right: 0.15em; font-weight: 700; font-size: 0.85em; }
  #status-bar { font-size: 0.85em; color: var(--text-muted); min-height: 1.4em; margin-top: 0.5em; }

  /* slot popover (read-only) */
  #slot-popover { position: fixed; background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 0.6em 0.9em; box-shadow: 0 4px 18px rgba(0,0,0,0.15); font-size: 0.82em; z-index: 30; display: none; max-width: 280px; }
  #slot-popover h4 { margin: 0 0 0.3em; font-size: 0.9em; }
  #slot-popover ul { margin: 0; padding-left: 1.2em; }
  #slot-popover .pop-meta { margin-top: 0.45em; font-size: 0.78em; color: var(--text-muted); }
  #slot-popover .pop-meta .warn { color: #b76a00; font-weight: 700; }

  /* edit popover (desktop default) */
  #edit-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.0); z-index: 49; display: none; }
  #edit-popover {
    position: fixed; background: #fff; border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18); font-size: 0.9em; z-index: 50; display: none;
    width: 340px; max-height: calc(100vh - 40px); display: none; flex-direction: column; overflow: hidden;
  }
  #edit-popover.open { display: flex; }
  #edit-popover .ep-handle { display: none; }
  #edit-popover .ep-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75em 1em 0.4em; border-bottom: 1px solid var(--border-soft); }
  #edit-popover .ep-header h4 { margin: 0; font-size: 0.98em; font-weight: 700; }
  #edit-popover #ep-close { background: transparent; border: 0; font-size: 1.2em; line-height: 1; color: var(--text-muted); padding: 0.25em 0.4em; border-radius: 6px; cursor: pointer; }
  #edit-popover #ep-close:hover { background: #f3f4f6; color: #222; }
  #edit-popover .ep-body { padding: 0.6em 1em 0.6em; overflow-y: auto; flex: 1 1 auto; }
  #edit-popover .ep-section { margin: 0.6em 0; }
  #edit-popover .ep-section-label { font-size: 0.8em; color: var(--text-muted); margin-bottom: 0.4em; font-weight: 600; }
  /* プリセットチップ（2列グリッド） */
  #edit-popover .ep-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5em; }
  #edit-popover .ep-preset {
    display: flex; flex-direction: column; gap: 0.15em; align-items: center; justify-content: center;
    padding: 0.7em 0.5em; min-height: 56px;
    border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer;
    font-size: 0.92em; line-height: 1.2; transition: background 0.1s, transform 0.05s;
  }
  #edit-popover .ep-preset:hover { background: #f1f6ff; border-color: var(--accent); }
  #edit-popover .ep-preset:active { transform: scale(0.98); background: #e0ecff; }
  #edit-popover .ep-preset .ep-preset-title { font-weight: 700; }
  #edit-popover .ep-preset .ep-preset-sub { font-size: 0.78em; color: var(--text-muted); }
  /* 時間帯エディタ */
  #edit-popover .ep-slots { display: flex; flex-direction: column; gap: 0.35em; }
  #edit-popover .ep-slot-row { display: flex; align-items: center; gap: 0.4em; border: 1px solid var(--border-soft); border-radius: 8px; padding: 0.45em 0.55em; background: #fafbfc; }
  #edit-popover .ep-slot-row input[type=time] { font-size: 0.95em; padding: 0.3em 0.4em; border: 1px solid var(--border); border-radius: 6px; background: #fff; min-width: 5.6em; }
  #edit-popover .ep-slot-sep { color: var(--text-muted); }
  #edit-popover .ep-slot-hours { margin-left: auto; font-size: 0.8em; color: var(--text-muted); white-space: nowrap; }
  #edit-popover .ep-slot-del { background: transparent; border: 0; color: #b71c1c; font-size: 1.05em; padding: 0.2em 0.45em; cursor: pointer; border-radius: 6px; }
  #edit-popover .ep-slot-del:hover { background: #fde2e2; }
  #edit-popover .ep-slot-empty { font-size: 0.82em; color: var(--text-muted); padding: 0.5em 0.1em; }
  #edit-popover .ep-slot-actions { display: flex; gap: 0.8em; margin-top: 0.45em; }
  #edit-popover .ep-link-btn { background: transparent; border: 0; color: var(--accent); padding: 0.3em 0; cursor: pointer; font-size: 0.85em; }
  #edit-popover .ep-link-btn:hover { text-decoration: underline; }
  #edit-popover .ep-slot-total { font-size: 0.85em; color: #222; font-weight: 700; margin-top: 0.4em; }
  /* 補助の数値入力（折り畳み） */
  #edit-popover .ep-advanced summary { font-size: 0.82em; color: var(--text-muted); cursor: pointer; padding: 0.3em 0; }
  #edit-popover .ep-advanced summary::marker { color: var(--text-muted); }
  #edit-popover .ep-advanced .ep-input { display: flex; align-items: center; gap: 0.4em; margin-top: 0.3em; }
  #edit-popover input[type=number] { width: 5.5em; padding: 0.35em 0.5em; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95em; }
  #edit-popover .ep-meta { font-size: 0.78em; color: var(--text-muted); margin-top: 0.6em; line-height: 1.55; }
  #edit-popover .ep-err { color: #b71c1c; font-size: 0.78em; margin-top: 0.4em; min-height: 1em; }
  /* フッターアクション */
  #edit-popover .ep-actions { display: flex; gap: 0.5em; padding: 0.6em 1em 0.85em; border-top: 1px solid var(--border-soft); background: #fff; }
  #edit-popover .ep-actions button { flex: 1; padding: 0.65em 0.9em; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 0.92em; font-weight: 600; min-height: 44px; }
  #edit-popover .ep-actions .clear { color: #b71c1c; flex: 0 0 auto; min-width: 4.5em; }
  #edit-popover .ep-actions #ep-cancel { color: var(--text-muted); }
  #edit-popover .ep-actions .save { background: var(--accent); color: #fff; border-color: var(--accent); flex: 2 1 auto; }

  /* モバイル: ボトムシート（≤768px） */
  @media (max-width: 768px) {
    #edit-backdrop { background: rgba(0,0,0,0.35); }
    #edit-popover {
      left: 0 !important; right: 0 !important; top: auto !important; bottom: 0 !important;
      width: 100% !important; max-width: 100%; border-radius: 16px 16px 0 0;
      max-height: 90vh; font-size: 1em;
      box-shadow: 0 -8px 28px rgba(0,0,0,0.22);
      animation: ep-slide-up 0.22s ease-out;
    }
    @keyframes ep-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    #edit-popover .ep-handle { display: block; width: 40px; height: 4px; background: #d0d4da; border-radius: 2px; margin: 0.5em auto 0.2em; }
    #edit-popover .ep-header { padding-top: 0.4em; }
    #edit-popover .ep-header h4 { font-size: 1.02em; }
    /* タップ領域を全部大きく */
    #edit-popover .ep-preset { min-height: 64px; font-size: 0.98em; }
    #edit-popover .ep-preset .ep-preset-sub { font-size: 0.82em; }
    #edit-popover .ep-slot-row { padding: 0.6em 0.65em; }
    #edit-popover .ep-slot-row input[type=time] { font-size: 1.05em; padding: 0.5em 0.45em; min-width: 6em; }
    #edit-popover .ep-slot-del { font-size: 1.2em; padding: 0.5em 0.7em; }
    #edit-popover .ep-link-btn { font-size: 0.95em; padding: 0.55em 0; }
    #edit-popover .ep-actions { padding-bottom: max(0.85em, env(safe-area-inset-bottom)); }
    #edit-popover .ep-actions button { min-height: 50px; font-size: 1em; }
  }
</style>
</head>
<body>

<h1>📅 リソースカレンダー（ADR 017 Phase 1.x）</h1>

<div class="toolbar">
  <div class="tabs" id="team-tabs" role="group" aria-label="表示するチーム（クリックで ON/OFF）"></div>
  <div class="nav-range">
    <button id="btn-prev">← 前 4 週</button>
    <span id="range-label">読み込み中...</span>
    <button id="btn-next">次 4 週 →</button>
    <button id="btn-today">今日に戻る</button>
  </div>
  <div class="right-buttons">
    <button id="btn-sync" class="primary">🔄 自分のGCalを再同期</button>
    <a href="/availability-setup.html" class="outline" style="text-decoration:none; display:inline-flex; align-items:center;">基本稼働時間 設定</a>
  </div>
</div>

<div class="privacy-note">
  🔒 GCal連動メンバーの予定について<strong>件名・場所・参加者などの「内容」は取得・表示していません</strong>（時間情報のみ）。
</div>

<div class="legend">
  <span><span class="gcal-mark">📅</span> GCal連動</span>
  <span><span class="leader-mark">★</span> チームリーダー</span>
  <span><span class="lg-manual">●</span> 手動上書き済</span>
  <span style="background:var(--bg-diverge);padding:0 6px;border-radius:3px;">▒</span> GCal計算と差分あり
</div>

<div id="status-bar">…</div>

<div class="grid-wrap">
  <table class="grid" id="grid"><thead></thead><tbody></tbody></table>
</div>

<!-- 読取専用（スロット表示）ポップオーバー -->
<div id="slot-popover"></div>

<!-- 編集ポップオーバー / モバイルではボトムシート -->
<div id="edit-backdrop"></div>
<div id="edit-popover" role="dialog" aria-modal="true">
  <div class="ep-handle" aria-hidden="true"></div>
  <div class="ep-header">
    <h4 id="ep-title">セル編集</h4>
    <button type="button" id="ep-close" aria-label="閉じる">✕</button>
  </div>
  <div class="ep-body">
    <!-- クイック設定 -->
    <div class="ep-section">
      <div class="ep-section-label">⚡ クイック設定（タップで即保存）</div>
      <div class="ep-presets">
        <button type="button" class="ep-preset" data-preset="all-ok">
          <span class="ep-preset-title">終日OK</span>
          <span class="ep-preset-sub" id="ep-preset-allok-sub">—</span>
        </button>
        <button type="button" class="ep-preset" data-preset="off">
          <span class="ep-preset-title">× 休み</span>
          <span class="ep-preset-sub">0h</span>
        </button>
        <button type="button" class="ep-preset" data-preset="am">
          <span class="ep-preset-title">AM のみ</span>
          <span class="ep-preset-sub">午前</span>
        </button>
        <button type="button" class="ep-preset" data-preset="pm">
          <span class="ep-preset-title">PM のみ</span>
          <span class="ep-preset-sub">午後</span>
        </button>
        <button type="button" class="ep-preset" data-preset="9to18">
          <span class="ep-preset-title">9-18 OK</span>
          <span class="ep-preset-sub">休憩1h</span>
        </button>
        <button type="button" class="ep-preset" data-preset="half">
          <span class="ep-preset-title">△ 微妙</span>
          <span class="ep-preset-sub">半分</span>
        </button>
      </div>
    </div>

    <!-- 時間帯エディタ -->
    <div class="ep-section">
      <div class="ep-section-label">🕒 時間帯で細かく</div>
      <div id="ep-slots" class="ep-slots"></div>
      <div class="ep-slot-actions">
        <button type="button" id="ep-slot-add" class="ep-link-btn">＋ 時間帯を追加</button>
        <button type="button" id="ep-slot-reset-gcal" class="ep-link-btn" title="GCal計算スロットで上書き">↻ GCalから取り直し</button>
      </div>
      <div class="ep-slot-total" id="ep-slot-total">合計 0.0h</div>
    </div>

    <!-- 数値手動入力（補助） -->
    <details class="ep-section ep-advanced">
      <summary>その他の指定</summary>
      <div class="ep-input">
        <input type="number" id="ep-hours" step="0.1" min="0" max="24" placeholder="例: 2.5">
        <span>h（合計のみ手動指定）</span>
      </div>
    </details>

    <div class="ep-meta" id="ep-meta"></div>
    <div class="ep-err" id="ep-err"></div>
  </div>
  <div class="ep-actions">
    <button type="button" class="clear" id="ep-clear" title="手動オーバーライドを解除">クリア</button>
    <button type="button" id="ep-cancel">キャンセル</button>
    <button type="button" class="save" id="ep-save">保存</button>
  </div>
</div>

<script>
async function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  // VIEW AS: localStorage.previewRole があれば送る（管理者のみサーバー側で尊重）
  try {
    const pv = window.localStorage && localStorage.getItem('previewRole');
    if (pv) headers['X-View-As'] = pv;
  } catch (_) {}
  const res = await fetch(url, { credentials: 'same-origin', headers, ...opts });
  let body;
  try { body = await res.json(); } catch (_) { body = null; }
  return { ok: res.ok, status: res.status, body };
}

const state = {
  from: null, to: null,
  data: null,
  me: null,                       // /auth/me の結果
  activeTeamIds: new Set(),       // 表示する team.id（チップが ON のもの）
  defaultsApplied: false,         // ロール別デフォルト適用済みか
};

// 全チームを表示扱いにする role
const FULL_VIEW_ROLES = new Set(['admin', 'secretary', 'producer', 'producer_director']);

// /grid 応答からビューワが所属する team.id を返す（基本チームのみ）
function findOwnTeamIds(viewerUserId, teams) {
  const ids = new Set();
  for (const t of (teams || [])) {
    for (const m of (t.members || [])) {
      if (m.user_id === viewerUserId) { ids.add(t.id); break; }
    }
  }
  return ids;
}

// ロール別デフォルトを activeTeamIds に書き込む
function applyDefaultActiveTeams() {
  if (!state.data || !state.me) return;
  const role = state.me.role || '';
  const teams = state.data.teams || [];
  if (FULL_VIEW_ROLES.has(role)) {
    state.activeTeamIds = new Set(teams.map(t => t.id));
  } else {
    const own = findOwnTeamIds(state.me.id, teams);
    // 自分のチームが無いロール（孤立アカウント等）は全チーム見せる方が親切
    state.activeTeamIds = own.size ? own : new Set(teams.map(t => t.id));
  }
  state.defaultsApplied = true;
}

function pad2(n) { return String(n).padStart(2, '0'); }
function fmtDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function parseDate(s) { return new Date(String(s) + 'T00:00:00'); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }

function defaultRange() {
  const today = new Date();
  const dow = today.getDay();
  const monday = addDays(today, -((dow + 6) % 7));
  const from = monday;
  const to = addDays(from, 69);
  return { from: fmtDate(from), to: fmtDate(to) };
}

function shiftRange(deltaDays) {
  state.from = fmtDate(addDays(parseDate(state.from), deltaDays));
  state.to   = fmtDate(addDays(parseDate(state.to),   deltaDays));
}

const WEEKDAY_JA = ['日','月','火','水','木','金','土'];

async function fetchMe() {
  try {
    const r = await apiFetch('/auth/me');
    if (r.ok) state.me = r.body || null;
  } catch (_) {}
}

async function load() {
  document.getElementById('status-bar').textContent = '読み込み中...';
  const params = new URLSearchParams();
  params.set('from', state.from);
  params.set('to',   state.to);
  // 常に org 全体を取り、チップ ON/OFF はフロントで絞り込む
  params.set('scope', 'org');
  const r = await apiFetch('/api/availability/grid?' + params.toString());
  if (!r.ok) {
    document.getElementById('status-bar').textContent = '読み込み失敗 (' + r.status + '): ' + (r.body?.error || '');
    return;
  }
  state.data = r.body;
  // 初回ロード時のみロール別デフォルトを適用
  if (!state.defaultsApplied) applyDefaultActiveTeams();
  // 新規追加されたチームを取りこぼさないよう、未知 ID は残さず既知のみに整える
  const known = new Set((r.body.teams || []).map(t => t.id));
  for (const id of Array.from(state.activeTeamIds)) {
    if (!known.has(id)) state.activeTeamIds.delete(id);
  }
  renderTabs();
  renderGrid();
  const active = state.activeTeamIds.size;
  const total = (r.body.teams || []).length;
  document.getElementById('status-bar').textContent = `期間: ${state.from} 〜 ${state.to} ／ 表示中: ${active}/${total}チーム`;
  document.getElementById('range-label').textContent = `${state.from} 〜 ${state.to}`;
}

function renderTabs() {
  const wrap = document.getElementById('team-tabs');
  const teams = (state.data && state.data.teams) || [];
  wrap.innerHTML = '';
  for (const t of teams) {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.dataset.teamId = t.id;
    btn.setAttribute('aria-pressed', state.activeTeamIds.has(t.id) ? 'true' : 'false');
    if (state.activeTeamIds.has(t.id)) btn.classList.add('active');
    btn.textContent = `${t.code} ${t.name}`;
    wrap.appendChild(btn);
  }
  // 一度だけハンドラを設定
  if (!wrap.dataset.bound) {
    wrap.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      const id = btn.dataset.teamId;
      if (!id) return;
      if (state.activeTeamIds.has(id)) state.activeTeamIds.delete(id);
      else state.activeTeamIds.add(id);
      btn.classList.toggle('active');
      btn.setAttribute('aria-pressed', state.activeTeamIds.has(id) ? 'true' : 'false');
      // 再描画（API再呼び出しは不要）
      renderGrid();
      const active = state.activeTeamIds.size;
      const total = (state.data?.teams || []).length;
      document.getElementById('status-bar').textContent = `期間: ${state.from} 〜 ${state.to} ／ 表示中: ${active}/${total}チーム`;
    });
    wrap.dataset.bound = '1';
  }
}

function renderGrid() {
  const data = state.data;
  if (!data) return;
  const dates = data.dates || [];
  const thead = document.querySelector('#grid thead');
  const tbody = document.querySelector('#grid tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // ===== ヘッダ =====
  const monthRow = document.createElement('tr');
  const monthHeadFiller = document.createElement('th'); monthHeadFiller.colSpan = 3; monthHeadFiller.textContent = '通常稼働時間';
  monthHeadFiller.className = 'month-head'; monthRow.appendChild(monthHeadFiller);
  let i = 0;
  while (i < dates.length) {
    const y = dates[i].slice(0,4), m = dates[i].slice(5,7);
    let j = i;
    while (j < dates.length && dates[j].slice(0,7) === `${y}-${m}`) j++;
    const span = j - i;
    const th = document.createElement('th'); th.className = 'month-head'; th.colSpan = span;
    th.textContent = `${parseInt(m,10)}月`;
    monthRow.appendChild(th);
    i = j;
  }
  const totalMonthHead = document.createElement('th'); totalMonthHead.className = 'month-head'; totalMonthHead.textContent = '合計'; monthRow.appendChild(totalMonthHead);
  thead.appendChild(monthRow);

  const headRow = document.createElement('tr');
  const thName = document.createElement('th'); thName.className = 'name-col'; thName.textContent = 'メンバー'; headRow.appendChild(thName);
  const thWeekday = document.createElement('th'); thWeekday.className = 'default-col default-weekday'; thWeekday.textContent = '平日'; headRow.appendChild(thWeekday);
  const thHoliday = document.createElement('th'); thHoliday.className = 'default-col default-holiday'; thHoliday.textContent = '休日'; headRow.appendChild(thHoliday);
  for (const ds of dates) {
    const d = parseDate(ds);
    const dow = d.getDay();
    const th = document.createElement('th');
    th.innerHTML = `${parseInt(ds.slice(8,10),10)}<br>${WEEKDAY_JA[dow]}`;
    if (dow === 0 || dow === 6) th.classList.add('is-holiday');
    headRow.appendChild(th);
  }
  const thTotal = document.createElement('th'); thTotal.className = 'total-col'; thTotal.textContent = '合計'; headRow.appendChild(thTotal);
  thead.appendChild(headRow);

  // ===== 本体 =====
  // チップ ON のチームだけを描画
  const allTeams = data.teams || [];
  const teams = allTeams.filter(t => state.activeTeamIds.has(t.id));
  if (!teams.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = dates.length + 4;
    td.style.cssText = 'text-align:center;padding:2em 1em;color:var(--text-muted);';
    td.textContent = '表示するチームがありません。上のチップでチームを ON にしてください。';
    tr.appendChild(td); tbody.appendChild(tr);
    return;
  }
  for (const t of teams) {
    const trH = document.createElement('tr'); trH.className = 'team-header';
    const tdH = document.createElement('td'); tdH.colSpan = dates.length + 4;
    tdH.textContent = `【${t.code} ${t.name}】`;
    trH.appendChild(tdH); tbody.appendChild(trH);

    for (const m of (t.members || [])) {
      const tr = document.createElement('tr');
      const tdN = document.createElement('td'); tdN.className = 'name-col';
      const gcal = m.is_gcal_connected ? `<span class="gcal-mark" title="GCal連動">📅</span>` : '';
      const leader = m.is_team_leader ? `<span class="leader-mark" title="チームリーダー">★</span>` : '';
      tdN.innerHTML = `${gcal}${leader}${escapeHtml(m.name)}`;
      tr.appendChild(tdN);
      const tdW = document.createElement('td'); tdW.className = 'default-col default-weekday'; tdW.textContent = fmtHours(m.weekday_default_hours); tr.appendChild(tdW);
      const tdH2 = document.createElement('td'); tdH2.className = 'default-col default-holiday'; tdH2.textContent = fmtHours(m.holiday_default_hours); tr.appendChild(tdH2);
      let sum = 0;
      for (const day of (m.days || [])) {
        const td = document.createElement('td'); td.className = 'day-cell';
        td.dataset.userId = m.user_id;
        td.dataset.date = day.date;
        applyCellState(td, day, m);
        sum += Number(day.hours || 0);
        tr.appendChild(td);
      }
      const tdT = document.createElement('td'); tdT.className = 'total-col'; tdT.textContent = fmtHours(sum); tr.appendChild(tdT);
      tbody.appendChild(tr);
    }

    const trT = document.createElement('tr'); trT.className = 'team-total';
    const tdTLabel = document.createElement('td'); tdTLabel.className = 'name-col'; tdTLabel.textContent = `${t.code}チーム合計`; trT.appendChild(tdTLabel);
    const tdTW = document.createElement('td'); tdTW.className = 'default-col default-weekday'; tdTW.textContent = fmtHours(t.team_total_weekday); trT.appendChild(tdTW);
    const tdTH = document.createElement('td'); tdTH.className = 'default-col default-holiday'; tdTH.textContent = fmtHours(t.team_total_holiday); trT.appendChild(tdTH);
    let teamSum = 0;
    for (const ds of dates) {
      const td = document.createElement('td');
      const v = (t.team_totals_by_date || {})[ds] || 0;
      teamSum += Number(v);
      if (parseDate(ds).getDay() % 6 === 0) td.classList.add('is-holiday');
      td.textContent = fmtHours(v);
      trT.appendChild(td);
    }
    const tdTSum = document.createElement('td'); tdTSum.className = 'total-col'; tdTSum.textContent = fmtHours(teamSum); trT.appendChild(tdTSum);
    tbody.appendChild(trT);
  }

  // 表示中チームが 2 以上のときだけ合計行を出す（1チームのときはチーム合計と同じなので冗長）
  if (teams.length >= 2) {
    const trO = document.createElement('tr'); trO.className = 'org-total';
    const tdOLabel = document.createElement('td'); tdOLabel.className = 'name-col'; tdOLabel.textContent = '【選択チーム合計】'; trO.appendChild(tdOLabel);
    const tdOEmpty1 = document.createElement('td'); tdOEmpty1.className = 'default-col default-weekday'; tdOEmpty1.textContent = ''; trO.appendChild(tdOEmpty1);
    const tdOEmpty2 = document.createElement('td'); tdOEmpty2.className = 'default-col default-holiday'; tdOEmpty2.textContent = ''; trO.appendChild(tdOEmpty2);
    let orgSum = 0;
    for (const ds of dates) {
      // 選択チームのみで再集計
      let v = 0;
      for (const t of teams) {
        v += Number((t.team_totals_by_date || {})[ds] || 0);
      }
      v = Math.round(v * 100) / 100;
      orgSum += v;
      const td = document.createElement('td');
      if (parseDate(ds).getDay() % 6 === 0) td.classList.add('is-holiday');
      td.textContent = fmtHours(v);
      trO.appendChild(td);
    }
    const tdOSum = document.createElement('td'); tdOSum.className = 'total-col'; tdOSum.textContent = fmtHours(orgSum); trO.appendChild(tdOSum);
    tbody.appendChild(trO);
  }
}

/**
 * day オブジェクトをセルに反映する（再描画にも使う）。
 *   day = { date, hours, symbol, source, is_holiday, slots, manual_override, diverges_from_gcal, computed_hours, base_hours }
 *   m   = { name, can_edit, is_gcal_connected, ... }
 */
function applyCellState(td, day, m) {
  // クラスリセット
  td.className = 'day-cell';
  if (day.is_holiday) td.classList.add('is-holiday');
  if (day.hours === 0) td.classList.add('zero');
  if (day.diverges_from_gcal) td.classList.add('diverge');

  // 内容: 記号があれば記号、無ければ時間 + manual marker
  const label = day.symbol ? escapeHtml(day.symbol) : escapeHtml(fmtHours(day.hours));
  const mark = day.manual_override ? '<span class="manual-mark" title="手動上書き済">●</span>' : '';
  td.innerHTML = `${label}${mark}`;

  // 編集可能性
  td.dataset.userId = m.user_id;
  td.dataset.date   = day.date;
  td.dataset.canEdit = m.can_edit ? '1' : '0';

  // 表示用データ: ホバー時に使う
  td.dataset.day = JSON.stringify(day);
  td.dataset.label = `${m.name} / ${day.date}`;
  td.dataset.memberName = m.name;
  td.dataset.gcalConnected = m.is_gcal_connected ? '1' : '0';

  // ツールチップ
  td.title = buildHoverTooltip(day, m);

  // クリックハンドラ
  td.onclick = null;
  if (m.can_edit) {
    td.classList.add('editable');
    td.addEventListener('click', onCellClickEdit);
  } else if ((day.slots || []).length) {
    // 読取専用ポップオーバー
    td.addEventListener('click', onCellClickReadonly);
  }
}

function buildHoverTooltip(day, m) {
  const lines = [];
  if (day.manual_override) {
    lines.push(`手動設定: ${day.symbol ? day.symbol : fmtHours(day.hours) + 'h'}`);
    if (day.computed_hours != null) lines.push(`GCal計算: ${fmtHours(day.computed_hours)}h`);
    if (day.diverges_from_gcal) lines.push('⚠ GCal計算と差分あり');
  } else if (day.source === 'gcal') {
    lines.push(`GCal計算: ${fmtHours(day.hours)}h`);
  } else {
    lines.push(`基本デフォルト: ${fmtHours(day.hours)}h`);
  }
  if (m.can_edit) lines.push('（クリックで編集）');
  return lines.join('\n');
}

function fmtHours(v) {
  if (v == null) return '';
  const n = Number(v);
  if (!isFinite(n)) return '';
  if (n === 0) return '0';
  const rounded = Math.round(n * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : String(rounded);
}

function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ====================================
// 読取専用ポップオーバー（編集権限が無いセル）
// ====================================
function onCellClickReadonly(e) {
  const td = e.currentTarget;
  closeEditPopover();
  const day = JSON.parse(td.dataset.day || 'null') || {};
  const slots = day.slots || [];
  const label = td.dataset.label || '';
  const pop = document.getElementById('slot-popover');

  let metaHtml = '';
  if (day.manual_override) {
    const sym = day.symbol ? ` (${escapeHtml(day.symbol)})` : '';
    metaHtml += `<div>手動上書き${sym}</div>`;
  }
  if (day.computed_hours != null) metaHtml += `<div>GCal計算: ${escapeHtml(fmtHours(day.computed_hours))}h</div>`;
  if (day.diverges_from_gcal) metaHtml += `<div class="warn">⚠ GCal計算と差分あり</div>`;

  pop.innerHTML = `<h4>${escapeHtml(label)}</h4>` + (slots.length
    ? '<ul>' + slots.map(s => `<li>${escapeHtml(s.from)} 〜 ${escapeHtml(s.to)}</li>`).join('') + '</ul>'
    : '<p>時間帯情報なし</p>')
    + (metaHtml ? `<div class="pop-meta">${metaHtml}</div>` : '')
    + '<div class="pop-meta">🔒 件名・場所等は表示していません</div>';
  const rect = td.getBoundingClientRect();
  pop.style.left = Math.min(window.innerWidth - 300, rect.left) + 'px';
  pop.style.top  = (rect.bottom + 4) + 'px';
  pop.style.display = 'block';
}

document.addEventListener('click', (e) => {
  const pop = document.getElementById('slot-popover');
  if (pop && pop.style.display === 'block') {
    if (!e.target.closest('.day-cell') && !e.target.closest('#slot-popover')) {
      pop.style.display = 'none';
    }
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeEditPopover();
    const pop = document.getElementById('slot-popover');
    if (pop) pop.style.display = 'none';
  }
});

// 背景タップで閉じる（モバイルのボトムシート想定）
document.getElementById('edit-backdrop').addEventListener('click', () => closeEditPopover());

// ====================================
// 編集ポップオーバー（プリセット + 時間帯エディタ）
// ====================================
const editState = {
  open: false,
  userId: null,
  date: null,
  memberName: null,
  td: null,
  day: null,         // 現在開いている day オブジェクト
  slots: [],         // [{from:'HH:MM', to:'HH:MM'}]
};

// 'HH:MM' を分に変換
function timeToMin(t) {
  if (typeof t !== 'string') return NaN;
  const m = /^(\d{1,2}):(\d{2})$/.exec(t.trim());
  if (!m) return NaN;
  const h = parseInt(m[1], 10), mm = parseInt(m[2], 10);
  if (h < 0 || h > 24 || mm < 0 || mm > 59) return NaN;
  return h * 60 + mm;
}
// スロット配列から合計時間（h）を計算
function slotsTotalHours(slots) {
  let mins = 0;
  for (const s of (slots || [])) {
    const a = timeToMin(s.from), b = timeToMin(s.to);
    if (!isFinite(a) || !isFinite(b)) continue;
    if (b > a) mins += (b - a);
  }
  return Math.round((mins / 60) * 100) / 100;
}

function onCellClickEdit(e) {
  e.stopPropagation();
  const td = e.currentTarget;
  const day = JSON.parse(td.dataset.day || 'null') || {};
  openEditPopover(td, day);
}

function openEditPopover(td, day) {
  // slot-popover は閉じる
  const slotPop = document.getElementById('slot-popover');
  if (slotPop) slotPop.style.display = 'none';

  editState.open = true;
  editState.userId = td.dataset.userId;
  editState.date = td.dataset.date;
  editState.memberName = td.dataset.memberName || '';
  editState.td = td;
  editState.day = day;

  const ep = document.getElementById('edit-popover');
  const backdrop = document.getElementById('edit-backdrop');
  const title = document.getElementById('ep-title');
  const hoursInput = document.getElementById('ep-hours');
  const meta = document.getElementById('ep-meta');
  const err = document.getElementById('ep-err');

  // タイトル
  const d = parseDate(editState.date);
  const dowJa = WEEKDAY_JA[d.getDay()];
  title.textContent = `${editState.date} (${dowJa})  ${editState.memberName}`;

  // 数値入力（補助）— 既存の手動 hours があれば入れる
  if (day.manual_override && !day.symbol && day.hours != null) {
    hoursInput.value = String(day.hours);
  } else {
    hoursInput.value = '';
  }
  hoursInput.placeholder = day.base_hours != null ? String(day.base_hours) : '2.5';

  // 「終日OK」プリセットの副題を更新（基本デフォルト時間）
  const allOkSub = document.getElementById('ep-preset-allok-sub');
  if (allOkSub) allOkSub.textContent = (day.base_hours != null ? fmtHours(day.base_hours) + 'h' : '基本値');

  // スロットの初期値:
  //  - 手動オーバーライドで slots がある → それを編集対象に
  //  - そうでなければ空（プリセット or 「↻GCalから取り直し」で埋める）
  let initSlots = [];
  if (day.manual_override && Array.isArray(day.slots) && day.slots.length && !day.symbol) {
    initSlots = day.slots.map(s => ({ from: s.from, to: s.to }));
  }
  editState.slots = initSlots;
  renderSlots();

  // メタ
  const metaLines = [];
  if (day.computed_hours != null) {
    const gcSlots = (Array.isArray(day.computed_slots) && day.computed_slots.length)
      ? day.computed_slots
      : ((day.source === 'gcal' && Array.isArray(day.slots)) ? day.slots : null);
    const slotsStr = (gcSlots && gcSlots.length)
      ? ' (' + gcSlots.map(s => `${s.from}-${s.to}`).join(', ') + ')'
      : '';
    metaLines.push(`現在のGCal計算値: ${fmtHours(day.computed_hours)}h${slotsStr}`);
  }
  if (day.base_hours != null) {
    metaLines.push(`基本デフォルト: ${fmtHours(day.base_hours)}h${day.is_holiday ? '（休日）' : '（平日）'}`);
  }
  if (day.manual_override) {
    const cur = day.symbol ? day.symbol : `${fmtHours(day.hours)}h`;
    metaLines.push(`現在の手動値: ${cur}`);
  }
  meta.innerHTML = metaLines.map(l => `<div>${escapeHtml(l)}</div>`).join('');
  err.textContent = '';

  // 表示
  backdrop.style.display = 'block';
  ep.classList.add('open');

  // デスクトップでは popover をセル近くに配置（モバイルは CSS でボトムシート）
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  if (!isMobile) {
    const rect = td.getBoundingClientRect();
    // 一旦表示してサイズ取得
    const epRect = ep.getBoundingClientRect();
    let left = rect.left;
    if (left + epRect.width > window.innerWidth - 8) left = window.innerWidth - epRect.width - 8;
    if (left < 8) left = 8;
    let top = rect.bottom + 4;
    if (top + epRect.height > window.innerHeight - 8) top = rect.top - epRect.height - 4;
    if (top < 8) top = 8;
    ep.style.left = left + 'px';
    ep.style.top  = top + 'px';
  } else {
    ep.style.left = '';
    ep.style.top = '';
  }
}

function closeEditPopover() {
  const ep = document.getElementById('edit-popover');
  if (!ep) return;
  ep.classList.remove('open');
  const backdrop = document.getElementById('edit-backdrop');
  if (backdrop) backdrop.style.display = 'none';
  document.getElementById('ep-hours').value = '';
  document.getElementById('ep-hours').placeholder = '2.5';
  document.getElementById('ep-err').textContent = '';
  editState.open = false;
  editState.userId = null;
  editState.date = null;
  editState.td = null;
  editState.day = null;
  editState.slots = [];
  renderSlots();
}

// スロット行の描画
function renderSlots() {
  const wrap = document.getElementById('ep-slots');
  const totalEl = document.getElementById('ep-slot-total');
  if (!wrap) return;
  if (!editState.slots.length) {
    wrap.innerHTML = '<div class="ep-slot-empty">時間帯未設定。プリセット or「＋ 時間帯を追加」/「↻ GCalから取り直し」</div>';
  } else {
    wrap.innerHTML = editState.slots.map((s, i) => {
      const a = timeToMin(s.from), b = timeToMin(s.to);
      const hours = (isFinite(a) && isFinite(b) && b > a) ? Math.round(((b - a) / 60) * 100) / 100 : null;
      const hoursStr = hours != null ? `${fmtHours(hours)}h` : '—';
      return `
        <div class="ep-slot-row" data-idx="${i}">
          <input type="time" class="ep-slot-from" value="${escapeHtml(s.from)}" step="900" aria-label="開始時刻">
          <span class="ep-slot-sep">─</span>
          <input type="time" class="ep-slot-to" value="${escapeHtml(s.to)}" step="900" aria-label="終了時刻">
          <span class="ep-slot-hours">${hoursStr}</span>
          <button type="button" class="ep-slot-del" aria-label="この時間帯を削除">✕</button>
        </div>`;
    }).join('');
    // 行内の input / 削除ボタンにイベント
    wrap.querySelectorAll('.ep-slot-row').forEach(row => {
      const idx = parseInt(row.dataset.idx, 10);
      row.querySelector('.ep-slot-from').addEventListener('change', e => {
        editState.slots[idx].from = e.target.value;
        renderSlots();
      });
      row.querySelector('.ep-slot-to').addEventListener('change', e => {
        editState.slots[idx].to = e.target.value;
        renderSlots();
      });
      row.querySelector('.ep-slot-del').addEventListener('click', () => {
        editState.slots.splice(idx, 1);
        renderSlots();
      });
    });
  }
  if (totalEl) totalEl.textContent = `合計 ${fmtHours(slotsTotalHours(editState.slots))}h`;
}

// 「＋ 時間帯を追加」
document.getElementById('ep-slot-add').addEventListener('click', () => {
  // デフォルト: 直前の to を起点、無ければ 09:00-12:00
  let from = '09:00', to = '12:00';
  if (editState.slots.length) {
    const last = editState.slots[editState.slots.length - 1];
    const lastTo = timeToMin(last.to);
    if (isFinite(lastTo)) {
      const startMin = Math.min(lastTo + 60, 22 * 60);
      const endMin = Math.min(startMin + 60, 23 * 60);
      from = `${String(Math.floor(startMin/60)).padStart(2,'0')}:${String(startMin%60).padStart(2,'0')}`;
      to   = `${String(Math.floor(endMin/60)).padStart(2,'0')}:${String(endMin%60).padStart(2,'0')}`;
    }
  }
  editState.slots.push({ from, to });
  renderSlots();
  // 追加した行の開始時刻をフォーカス
  setTimeout(() => {
    const rows = document.querySelectorAll('#ep-slots .ep-slot-row');
    const last = rows[rows.length - 1];
    if (last) last.querySelector('.ep-slot-from')?.focus();
  }, 0);
});

// 「↻ GCalから取り直し」
document.getElementById('ep-slot-reset-gcal').addEventListener('click', () => {
  const d = editState.day || {};
  let slots = null;
  if (Array.isArray(d.computed_slots) && d.computed_slots.length) slots = d.computed_slots;
  else if (d.source === 'gcal' && Array.isArray(d.slots) && d.slots.length) slots = d.slots;
  if (!slots || !slots.length) {
    document.getElementById('ep-err').textContent = 'GCal計算スロットがありません（連携前 or 当日の予定なし）';
    return;
  }
  editState.slots = slots.map(s => ({ from: s.from, to: s.to }));
  renderSlots();
});

// プリセット（タップで即保存）
document.querySelectorAll('#edit-popover .ep-preset').forEach(btn => {
  btn.addEventListener('click', async () => {
    const day = editState.day || {};
    const preset = btn.dataset.preset;
    let payload = null;
    if (preset === 'all-ok') {
      const h = (day.base_hours != null) ? day.base_hours : 8;
      payload = { hours: h };
    } else if (preset === 'off')   payload = { symbol: '×' };
    else if (preset === 'am')      payload = { symbol: 'AM' };
    else if (preset === 'pm')      payload = { symbol: 'PM' };
    else if (preset === 'half')    payload = { symbol: '△' };
    else if (preset === '9to18')   payload = { slots: [{from:'09:00',to:'12:00'},{from:'13:00',to:'18:00'}] };
    if (!payload) return;
    await submitEdit(payload);
  });
});

document.getElementById('ep-close').addEventListener('click', closeEditPopover);
document.getElementById('ep-cancel').addEventListener('click', closeEditPopover);
document.getElementById('ep-clear').addEventListener('click', async () => {
  await submitEdit({ clear: true });
});

document.getElementById('ep-save').addEventListener('click', async () => {
  const errEl = document.getElementById('ep-err');
  errEl.textContent = '';
  // 優先順位: スロット > 数値h
  // スロットが1件以上あればスロット保存
  const cleanSlots = (editState.slots || []).filter(s => {
    const a = timeToMin(s.from), b = timeToMin(s.to);
    return isFinite(a) && isFinite(b) && b > a;
  });
  if (cleanSlots.length) {
    await submitEdit({ slots: cleanSlots });
    return;
  }
  const hoursStr = document.getElementById('ep-hours').value.trim();
  if (hoursStr !== '') {
    const n = parseFloat(hoursStr);
    if (!isFinite(n) || n < 0 || n > 24) {
      errEl.textContent = 'hours は 0〜24 の数値で入力してください';
      return;
    }
    await submitEdit({ hours: Math.round(n * 100) / 100 });
    return;
  }
  errEl.textContent = 'プリセット／時間帯／合計h のいずれかを指定してください';
});

async function submitEdit(payload) {
  if (!editState.userId || !editState.date) return;
  const errEl = document.getElementById('ep-err');
  errEl.textContent = '';
  const body = {
    user_id: editState.userId,
    date: editState.date,
  };
  if (payload.clear) {
    body.clear = true;
  } else {
    if (payload.hours != null) body.hours = payload.hours;
    if (payload.symbol) body.symbol = payload.symbol;
    if (Array.isArray(payload.slots)) body.slots = payload.slots;
  }
  const r = await apiFetch('/api/availability/daily', {
    method: 'PATCH',
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    errEl.textContent = `保存失敗 (${r.status}): ${r.body?.error || ''}`;
    return;
  }
  // セル即時反映
  const cell = r.body && r.body.cell;
  if (cell && editState.td) {
    const td = editState.td;
    const oldDay = JSON.parse(td.dataset.day || 'null') || {};
    const newDay = Object.assign({}, oldDay, {
      hours: cell.hours,
      symbol: cell.symbol,
      source: cell.source,
      slots: cell.slots || [],
      manual_override: !!cell.manual_override,
      diverges_from_gcal: !!cell.diverges_from_gcal,
      computed_hours: cell.computed_hours,
      computed_slots: cell.computed_slots != null ? cell.computed_slots : oldDay.computed_slots,
      base_hours: cell.base_hours,
    });
    const memberShim = {
      user_id: td.dataset.userId,
      name: td.dataset.memberName,
      can_edit: td.dataset.canEdit === '1',
      is_gcal_connected: td.dataset.gcalConnected === '1',
    };
    applyCellState(td, newDay, memberShim);
  }
  closeEditPopover();
  recomputeRowAndTeamTotals();
}

// セル更新時の合計行を再計算（簡易版）— DOM を読み直して数値合計
function recomputeRowAndTeamTotals() {
  // tbody の各 tr を走査
  const tbody = document.querySelector('#grid tbody');
  if (!tbody) return;
  // member 行のみ合計再計算
  for (const tr of tbody.querySelectorAll('tr')) {
    if (tr.classList.contains('team-header')) continue;
    if (tr.classList.contains('team-total')) continue;
    if (tr.classList.contains('org-total')) continue;
    const cells = tr.querySelectorAll('td.day-cell');
    if (!cells.length) continue;
    let sum = 0;
    for (const td of cells) {
      const d = JSON.parse(td.dataset.day || 'null');
      if (d && typeof d.hours === 'number') sum += d.hours;
    }
    const totalCell = tr.querySelector('td.total-col');
    if (totalCell) totalCell.textContent = fmtHours(sum);
  }
  // team / org 合計の正確な再計算は load() に任せる（次回更新時に整合）
}

document.getElementById('btn-prev').addEventListener('click', () => { shiftRange(-28); load(); });
document.getElementById('btn-next').addEventListener('click', () => { shiftRange(28); load(); });
document.getElementById('btn-today').addEventListener('click', () => { const r = defaultRange(); state.from = r.from; state.to = r.to; load(); });

document.getElementById('btn-sync').addEventListener('click', async () => {
  const btn = document.getElementById('btn-sync');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '同期中...';
  try {
    const r = await apiFetch('/api/availability/sync-self', {
      method: 'POST',
      body: JSON.stringify({ from: state.from, to: state.to }),
    });
    if (!r.ok) {
      alert('同期に失敗しました (' + r.status + '): ' + (r.body?.error || ''));
    } else {
      const s = r.body || {};
      alert(`同期完了\n対象日数: ${s.upserted}\nスキップ(過去日): ${s.skipped_past}\nスキップ(手動上書): ${s.skipped_manual}\n取得イベント数: ${s.event_count}`);
      await load();
    }
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
});

// 連携済みユーザーは初回ロード後に自動同期（連携してるのに反映されない事故を防ぐ）
let _autoSyncedThisSession = false;
async function autoSyncSelfIfConnected() {
  if (_autoSyncedThisSession) return;
  if (!state.me || !state.me.id) return;
  const myUid = state.me.id;
  let isGcal = false;
  for (const t of (state.data?.teams || [])) {
    const me = (t.members || []).find(m => m.user_id === myUid);
    if (me && me.is_gcal_connected) { isGcal = true; break; }
  }
  if (!isGcal) return;
  _autoSyncedThisSession = true;
  const bar = document.getElementById('status-bar');
  const prev = bar ? bar.textContent : '';
  if (bar) bar.textContent = (prev ? prev + ' ／ ' : '') + '自分のGCalを同期中…';
  try {
    const r = await apiFetch('/api/availability/sync-self', {
      method: 'POST',
      body: JSON.stringify({ from: state.from, to: state.to }),
    });
    if (r.ok && r.body && r.body.upserted > 0) {
      await load();
      const b2 = document.getElementById('status-bar');
      if (b2) b2.textContent = b2.textContent + ' ／ GCal同期反映済み';
    } else if (!r.ok) {
      if (bar) bar.textContent = prev + ' ／ GCal同期失敗: ' + (r.body?.error || r.status);
    } else {
      if (bar) bar.textContent = prev;
    }
  } catch (e) {
    if (bar) bar.textContent = prev + ' ／ GCal同期エラー';
  }
}

(async () => {
  await fetchMe();
  const r = defaultRange();
  state.from = r.from; state.to = r.to;
  await load();
  // 初回のみバックグラウンド同期（待たない）
  autoSyncSelfIfConnected();
})();
