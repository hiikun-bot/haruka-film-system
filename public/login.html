<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARUKA FILM SYSTEM — ログイン</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png?v=2">
<link rel="shortcut icon" href="/icon-192.png?v=2">
<link rel="apple-touch-icon" href="/icon-180.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:#00c8c4;
}

/* 背景画像 */
.bg{
  position:fixed;inset:0;
  background:url('HARUKAFILM背景.png') center/cover no-repeat;
  z-index:0;
}
/* 蛍光ティールのカラーウォッシュ */
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,190,185,0.40) 0%,rgba(0,160,155,0.30) 100%);
  mix-blend-mode:screen;
}

/* ラッパー */
.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:32px;
}

/* ロゴエリア */
.logo-area{text-align:center}
.logo-title{
  font-family:'Montserrat',sans-serif;
  font-size:38px;font-weight:800;
  letter-spacing:0.18em;
  color:#fff;
  text-shadow:0 0 20px #fff,0 0 40px rgba(80,255,250,0.9),0 0 80px rgba(0,255,248,0.5);
  line-height:1.1;
}
.logo-accent{color:#7FFCF8;text-shadow:0 0 16px #7FFCF8,0 0 32px rgba(0,255,248,0.8)}
.logo-bar{
  width:260px;height:2px;
  background:linear-gradient(90deg,transparent,#7FFCF8,transparent);
  margin:4px auto 10px;
  border-radius:1px;
  box-shadow:0 0 10px #7FFCF8,0 0 20px rgba(0,255,248,0.5);
}
.logo-sub{
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:400;
  letter-spacing:0.6em;
  color:#fff;
  text-shadow:0 0 10px rgba(120,255,250,0.8);
  white-space:nowrap;
}

/* カード */
.card{
  width:100%;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  padding:36px 32px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* エラー */
.error-msg{
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.35);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#ff9090;
  margin-bottom:18px;display:none;
}
.error-msg.show{display:block}

/* Google ボタン */
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 20px;
  background:rgba(255,255,255,0.95);color:#1a1a1a;
  border:none;border-radius:10px;
  font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  text-decoration:none;
  letter-spacing:.3px;
}
.btn-google:hover{background:#fff;transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,0.25)}
.google-icon{width:20px;height:20px;flex-shrink:0}

/* 区切り */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.18)}
.divider-text{font-size:11px;color:rgba(255,255,255,0.45);white-space:nowrap}

/* フォーム */
.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:11px;
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.6);
  margin-bottom:6px;font-weight:500;
}
.form-control{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:8px;padding:11px 14px;
  color:#fff;font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
  transition:border-color .15s,background .15s;
  outline:none;
}
.form-control:focus{
  border-color:rgba(62,207,202,0.7);
  background:rgba(255,255,255,0.12);
}
.form-control::placeholder{color:rgba(255,255,255,0.3)}

/* ログインボタン */
.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#3ECFCA,#2BB8B4);
  color:#fff;
  border:none;border-radius:10px;
  font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  letter-spacing:0.08em;
  box-shadow:0 4px 16px rgba(62,207,202,0.35);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#4ADBD6,#35C8C4);
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(62,207,202,0.5);
}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* フッター */
.footer-note{
  text-align:center;margin-top:18px;
  font-size:11px;color:rgba(255,255,255,0.38);line-height:1.7;
}

/* スピナー */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* モバイル (max-width:480px) */
@media(max-width:480px){
  .login-wrap{padding:16px;gap:22px}
  .logo-title{font-size:28px;letter-spacing:0.14em}
  .logo-bar{width:80vw;max-width:220px}
  .logo-sub{font-size:11px;letter-spacing:0.4em}
  .card{padding:24px 20px;border-radius:16px}
  .form-control{font-size:16px;padding:12px 14px}
  .btn-primary,.btn-google{padding:14px;font-size:14px}
  .divider{margin:18px 0}
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="login-wrap">
  <!-- ロゴ -->
  <div class="logo-area">
    <div class="logo-title">HARUKA<span class="logo-accent"> FILM</span></div>
    <div class="logo-bar"></div>
    <div class="logo-sub">光を当てる、あなたのストーリーに</div>
  </div>

  <!-- カード -->
  <div class="card">
    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" class="form-control" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()" style="padding-right:42px">
        <button type="button" onclick="togglePassword()" id="pw-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:rgba(255,255,255,0.5);line-height:1" title="パスワードを表示">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" onclick="login()" id="login-btn">ログイン</button>

    <div class="footer-note">
      アカウントをお持ちでない方は管理者から招待リンクを受け取ってください
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
if (params.get('error')) {
  showError({ google: 'Googleログインに失敗しました。招待済みのアカウントでログインしてください。' }[params.get('error')] || 'ログインエラーが発生しました');
}

function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  if (!email || !password) { showError('メールアドレスとパスワードを入力してください'); return; }
  btn.innerHTML = '<span class="spinner"></span>ログイン中...';
  btn.disabled = true;
  try {
    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'ログインに失敗しました'); return; }
    window.location.href = '/haruka.html';
  } catch(e) {
    showError('ネットワークエラーが発生しました');
  } finally {
    btn.innerHTML = 'ログイン';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
