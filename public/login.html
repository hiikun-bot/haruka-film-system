<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARUKA FILM SYSTEM — ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:#0a2e2d;
}

/* 背景画像 */
.bg{
  position:fixed;inset:0;
  background:url('HARUKAFILM背景.png') center/cover no-repeat;
  z-index:0;
}
/* 暗めのオーバーレイ：文字を読みやすく */
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(5,30,28,0.72) 0%,rgba(8,40,38,0.60) 100%);
}

/* ラッパー */
.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:32px;
}

/* ロゴエリア */
.logo-area{text-align:center}
.logo-title{
  font-family:'Montserrat',sans-serif;
  font-size:36px;font-weight:800;
  letter-spacing:0.18em;
  color:#fff;
  text-shadow:0 2px 20px rgba(62,207,202,0.5);
  line-height:1.1;
}
.logo-accent{color:#3ECFCA}
.logo-sub{
  font-family:'Montserrat',sans-serif;
  font-size:10px;font-weight:400;
  letter-spacing:0.35em;
  color:rgba(255,255,255,0.55);
  margin-top:8px;
  text-transform:uppercase;
}
.logo-bar{
  width:40px;height:2px;
  background:linear-gradient(90deg,#3ECFCA,rgba(62,207,202,0));
  margin:12px auto 0;
  border-radius:2px;
}

/* カード */
.card{
  width:100%;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  padding:36px 32px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* エラー */
.error-msg{
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.35);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#ff9090;
  margin-bottom:18px;display:none;
}
.error-msg.show{display:block}

/* Google ボタン */
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 20px;
  background:rgba(255,255,255,0.95);color:#1a1a1a;
  border:none;border-radius:10px;
  font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  text-decoration:none;
  letter-spacing:.3px;
}
.btn-google:hover{background:#fff;transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,0.25)}
.google-icon{width:20px;height:20px;flex-shrink:0}

/* 区切り */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.18)}
.divider-text{font-size:11px;color:rgba(255,255,255,0.45);white-space:nowrap}

/* フォーム */
.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:11px;
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.6);
  margin-bottom:6px;font-weight:500;
}
.form-control{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:8px;padding:11px 14px;
  color:#fff;font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
  transition:border-color .15s,background .15s;
  outline:none;
}
.form-control:focus{
  border-color:rgba(62,207,202,0.7);
  background:rgba(255,255,255,0.12);
}
.form-control::placeholder{color:rgba(255,255,255,0.3)}

/* ログインボタン */
.btn-primary{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#3ECFCA,#2BB8B4);
  color:#fff;
  border:none;border-radius:10px;
  font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  letter-spacing:0.08em;
  box-shadow:0 4px 16px rgba(62,207,202,0.35);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#4ADBD6,#35C8C4);
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(62,207,202,0.5);
}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* フッター */
.footer-note{
  text-align:center;margin-top:18px;
  font-size:11px;color:rgba(255,255,255,0.38);line-height:1.7;
}

/* スピナー */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="bg"></div>

<div class="login-wrap">
  <!-- ロゴ -->
  <div class="logo-area">
    <div class="logo-title">HARUKA<span class="logo-accent"> FILM</span></div>
    <div class="logo-sub">Production Management System</div>
    <div class="logo-bar"></div>
  </div>

  <!-- カード -->
  <div class="card">
    <div class="error-msg" id="error-msg"></div>

    <!-- Google ログイン -->
    <a href="/auth/google" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleアカウントでログイン
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">またはメールアドレスで</div>
      <div class="divider-line"></div>
    </div>

    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" class="form-control" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()" style="padding-right:42px">
        <button type="button" onclick="togglePassword()" id="pw-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:rgba(255,255,255,0.5);line-height:1" title="パスワードを表示">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" onclick="login()" id="login-btn">ログイン</button>

    <div class="footer-note">
      アカウントをお持ちでない方は管理者から招待リンクを受け取ってください
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
if (params.get('error')) {
  showError({ google: 'Googleログインに失敗しました。招待済みのアカウントでログインしてください。' }[params.get('error')] || 'ログインエラーが発生しました');
}

function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  if (!email || !password) { showError('メールアドレスとパスワードを入力してください'); return; }
  btn.innerHTML = '<span class="spinner"></span>ログイン中...';
  btn.disabled = true;
  try {
    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'ログインに失敗しました'); return; }
    window.location.href = '/haruka.html';
  } catch(e) {
    showError('ネットワークエラーが発生しました');
  } finally {
    btn.innerHTML = 'ログイン';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
