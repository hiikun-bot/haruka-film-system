name: Auto-merge

# auto-merge ラベル付き PR の GitHub Auto-merge を有効化する。
#
# migration ガード（重要）:
#   migration ファイル（migrations/** または supabase_schema.sql）を含む PR は、
#   `db-migration-applied` ラベルが付くまで Auto-merge を **有効化しない**。
#   さらに、既に有効化済みの PR で needs-db-migration が後から付いて
#   db-migration-applied がまだの場合は --disable-auto で打ち消す（race防止）。
#
# 過去事例（PR #204）:
#   needs-db-migration ラベル付与より先に auto-merge が走り、guard が初回 pass を返した
#   状態でマージされて本番DB未適用のままRailwayへデプロイされた。
#   その再発防止のため、auto-merge.yml 自身がラベル状態とPRファイルを直接確認する。
#
# Verup ワークフロー連動（重要）:
#   `gh pr merge --auto` を GITHUB_TOKEN で実行すると、その後の自動マージで生成される
#   `pull_request: closed` / `push: main` イベントは GitHub の仕様により
#   下流ワークフロー（Verup情報自動登録など）を一切起動しない。
#   そのため、`BOT_TOKEN` シークレット（Personal Access Token / GitHub App token）が
#   設定されていればそれを優先使用する。未設定時は従来どおり GITHUB_TOKEN にフォールバック。

on:
  pull_request:
    types: [labeled, unlabeled, opened, reopened, synchronize, ready_for_review]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

# 同じ PR 内で重複起動を許さない（cancel-in-progress: true で古い run を即停止）。
# PR 単位のグループにすることで他PRの auto-merge は並列に動ける。
concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: auto-mergeラベル付きPRに対して GitHub Auto-merge を有効化
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'auto-merge')) ||
      github.event_name == 'check_suite' ||
      github.event_name == 'workflow_run'
    steps:
      - name: 🛑 無限ループ検出ガード（直近5分で50回超なら強制停止）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SINCE=$(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/auto-merge.yml/runs?per_page=100" \
            --jq "[.workflow_runs[] | select(.created_at > \"$SINCE\")] | length")
          echo "直近5分の auto-merge 実行数: $COUNT"
          if [ "$COUNT" -gt 50 ]; then
            echo "::error::🚨 ループ検出: 直近5分で ${COUNT} 回実行された → 強制停止します。Actions タブで該当 workflow を Disable してから原因調査してください。"
            exit 1
          fi

      - name: auto-merge ラベルがなければ作成
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-merge \
            --color 0E8A16 \
            --description "CIが通り次第自動squash merge" \
            --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || true

      - name: PR の auto-merge を有効化（migration ガード付き）
        env:
          # BOT_TOKEN が設定されていれば優先使用（下流ワークフロー連動のため）。未設定なら GITHUB_TOKEN。
          GH_TOKEN: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          if [ -z "$PR_NUMBER" ]; then
            echo "PR番号が取得できないためスキップ（check_suite / workflow_run の場合は自動補完なし）"
            exit 0
          fi

          # 1) ラベルを取得
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '.labels[].name' || echo "")
          if ! echo "$LABELS" | grep -qx "auto-merge"; then
            echo "auto-merge ラベルなし → スキップ"
            exit 0
          fi

          # 2) PR が migration を含むか判定
          #    needs-db-migration ラベルがまだ付与されていない race を防ぐため、
          #    PR の files API も直接見る。
          MIGRATION_FILE_COUNT=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files \
            --jq '[.files[] | select(.path | startswith("migrations/") or . == "supabase_schema.sql")] | length')
          HAS_NEEDS_LABEL=false
          HAS_APPLIED_LABEL=false
          echo "$LABELS" | grep -qx "needs-db-migration"   && HAS_NEEDS_LABEL=true
          echo "$LABELS" | grep -qx "db-migration-applied" && HAS_APPLIED_LABEL=true

          echo "MIGRATION_FILE_COUNT=$MIGRATION_FILE_COUNT"
          echo "HAS_NEEDS_LABEL=$HAS_NEEDS_LABEL"
          echo "HAS_APPLIED_LABEL=$HAS_APPLIED_LABEL"

          IS_MIGRATION_PR=false
          if [ "$MIGRATION_FILE_COUNT" -gt 0 ] || [ "$HAS_NEEDS_LABEL" = "true" ]; then
            IS_MIGRATION_PR=true
          fi

          # 3) migration を含む PR で db-migration-applied 未付与なら、
          #    既存の auto-merge を打ち消して終了
          if [ "$IS_MIGRATION_PR" = "true" ] && [ "$HAS_APPLIED_LABEL" != "true" ]; then
            echo "⏸ migration を含む PR だが db-migration-applied 未付与 → auto-merge を無効化（再有効化はラベル付与後）"
            gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --disable-auto 2>/dev/null || true
            exit 0
          fi

          # 4) ガード条件 OK → Auto-merge を有効化
          echo "✅ ガード条件OK → GitHub Auto-merge を有効化"
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --auto --delete-branch || true
